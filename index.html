
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Appliance Container Fit Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>Appliance Container Fit Calculator</h1>

<h3>Enter Appliance & Packaging Dimensions</h3>

<form id="calcForm">
  <label>Unit Width (in): <input type="number" id="uWidth" step="0.01" required></label>
  <label>Unit Depth (in): <input type="number" id="uDepth" step="0.01" required></label>
  <label>Unit Height (in): <input type="number" id="uHeight" step="0.01" required></label>

  <label>Side Pack Thickness (in): <input type="number" id="sidePack" step="0.01" required></label>
  <label>Front Pack Thickness (in): <input type="number" id="frontPack" step="0.01" required></label>
  <label>Box Thickness (in): <input type="number" id="boxThickness" step="0.01" required></label>
  <label>Box Height (in): <input type="number" id="boxHeight" step="0.01" required></label>

  <label>Clamp Blade Thickness (in): <input type="number" id="clampBlade" step="0.01" value="0.25" required></label>

  <button type="submit">Calculate Container Fits</button>
</form>

<pre id="output" class="results"></pre>

<script src="script.js"></script>
</body>
</html>
